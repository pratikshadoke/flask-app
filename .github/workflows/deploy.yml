name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}:latest
      GITHUB_USERNAME: ${{ github.repository_owner }}

    steps:
      # 🔹 Checkout Code
      - name: Checkout
        uses: actions/checkout@v3

      # 🔹 Login to GHCR
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 🔹 Build Docker Image
      - name: Build Image
        run: docker build -t $IMAGE_NAME .

      # 🔹 Push Docker Image
      - name: Push Image
        run: docker push $IMAGE_NAME

      # 🔹 Replace USERNAME in deployment.yaml
      - name: Generate deployment-final.yaml
        run: |
          sed "s|USERNAME|$GITHUB_USERNAME|g" k8s/deployment.yaml > k8s/deployment-final.yaml

      # 🔹 Debug (optional but recommended)
      - name: Show generated file
        run: cat k8s/deployment-final.yaml

      # 🔹 Copy files to EC2 (FIXED)
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/deployment-final.yaml,k8s/service.yaml"
          target: "/home/${{ secrets.EC2_USER }}/"
          strip_components: 1   # 🔥 removes k8s/ prefix

      # 🔹 Debug files on EC2 (VERY USEFUL)
      - name: Debug files on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Listing files in home directory"
            ls -l /home/${{ secrets.EC2_USER }}

      # 🔹 Deploy to Kubernetes (FIXED)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            sudo kubectl apply -f /home/${{ secrets.EC2_USER }}/deployment-final.yaml
            sudo kubectl apply -f /home/${{ secrets.EC2_USER }}/service.yaml

            sudo kubectl rollout status deployment/flask-app

      # 🔹 Verify Deployment
      - name: Check Pods
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            sudo kubectl get pods -o wide